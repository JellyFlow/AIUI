name: 功能建议
description: 为 AIUI 提交新想法或增强建议
title: "[功能建议]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢你帮助改进 AIUI。请尽量详细描述你的功能建议，方便维护者评估。

  - type: textarea
    id: problem
    attributes:
      label: 问题背景或使用场景
      description: 你想解决什么问题，或者希望改进哪个使用流程？
      placeholder: 请描述你的使用场景或当前痛点。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的解决方案
      description: 你希望 AIUI 提供什么能力或行为？
      placeholder: 请描述你期望的功能或行为。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你是否考虑过其他实现方式或临时 workaround？
      placeholder: 请补充你考虑过的替代方案或当前 workaround。

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可补充截图、草图、链接或其他有帮助的信息。
      placeholder: 请输入补充信息。
