name: Feature Request
description: Suggest an idea or enhancement for AIUI
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AIUI. Please describe the feature request with enough detail for maintainers to evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve, or what workflow would this improve?
      placeholder: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe the feature or behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative approaches or workarounds?
      placeholder: Share any alternatives or current workarounds.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, screenshots, links, or any other supporting details.
      placeholder: Additional context.
